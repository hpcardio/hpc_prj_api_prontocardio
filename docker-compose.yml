services:
  prontocardio_database:
    image: postgres
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api_prontocardio:
    image: api_prontocardio
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      prontocardio_database:
        condition: service_healthy

volumes:
  pgdata: